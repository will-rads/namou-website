<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Al Marjan with concentric proximity rings to the Wynn integrated resort, showing freehold zones inside the 30km radius">
  <defs>
    <style>
      .stroke { stroke: #003D2E; stroke-width: 1.25; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ringDash { stroke: #003D2E; stroke-width: 1; fill: none; stroke-dasharray: 5 5; }
      .label { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #003D2E; font-weight: 500; }
      .label--soft { font-family: 'DM Sans', sans-serif; font-size: 10px; fill: #6FB89C; letter-spacing: 0.08em; text-transform: uppercase; }
      .pill { font-family: 'DM Sans', sans-serif; font-size: 10px; fill: #6FB89C; font-weight: 500; }
    </style>
  </defs>
  <rect width="600" height="600" fill="#F4FAF7"/>

  <!-- Sea hint -->
  <text x="60" y="50" class="label--soft">ARABIAN GULF</text>

  <!-- 20km ring -->
  <circle cx="220" cy="300" r="240" class="ringDash" fill="#3FE6A8" fill-opacity="0.05"/>
  <text x="220" y="76" class="pill" text-anchor="middle">20 KM</text>

  <!-- 10km ring -->
  <circle cx="220" cy="300" r="140" class="ringDash" fill="#3FE6A8" fill-opacity="0.10"/>
  <text x="220" y="175" class="pill" text-anchor="middle">10 KM</text>

  <!-- 5km ring -->
  <circle cx="220" cy="300" r="65" class="ringDash" fill="#3FE6A8" fill-opacity="0.20"/>
  <text x="220" y="247" class="pill" text-anchor="middle">5 KM</text>

  <!-- Center: Wynn pin -->
  <line x1="220" y1="295" x2="220" y2="278" class="stroke"/>
  <circle cx="220" cy="300" r="5" fill="#003D2E"/>
  <text x="220" y="272" class="label" text-anchor="middle" font-size="12" font-weight="600">Wynn Al Marjan</text>

  <!-- Al Marjan Island (within 5km) -->
  <text x="220" y="320" class="label" text-anchor="middle">Al Marjan Island</text>

  <!-- Mina Al Arab (~10km, NE) -->
  <circle cx="290" cy="225" r="3" fill="#003D2E"/>
  <text x="298" y="229" class="label">Mina Al Arab</text>

  <!-- Al Hamra (~10km, SE) -->
  <circle cx="305" cy="370" r="3" fill="#003D2E"/>
  <text x="313" y="374" class="label">Al Hamra</text>

  <!-- Al Nakheel (~20km, NE) -->
  <circle cx="395" cy="180" r="3" fill="#003D2E"/>
  <text x="403" y="184" class="label">Al Nakheel</text>

  <!-- RAK Central (~20km, E) -->
  <circle cx="420" cy="295" r="3" fill="#003D2E"/>
  <text x="428" y="299" class="label">RAK Central</text>

  <!-- Dafan Al Maireed (~20km, SE) -->
  <circle cx="385" cy="425" r="3" fill="#003D2E"/>
  <text x="393" y="429" class="label">Dafan Al Maireed</text>

  <!-- Compass -->
  <g transform="translate(540,540)">
    <circle r="18" class="stroke"/>
    <line x1="0" y1="-12" x2="0" y2="12" class="stroke"/>
    <text y="-22" class="pill" text-anchor="middle">N</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40,540)">
    <circle cx="6" cy="0" r="3" fill="#003D2E"/>
    <text x="16" y="4" class="label--soft">FREEHOLD ZONE</text>
  </g>
</svg>
