<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Build-lease isometric illustration">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <polygon points="70,140 120,128 170,140 120,152" class="stroke" fill="#F4FAF7"/>
<polygon points="70,124 120,112 170,124 120,136" class="stroke" fill="#F4FAF7"/>
<polygon points="70,108 120,96 170,108 120,120" class="stroke" fill="#F4FAF7"/>
<polygon points="70,92 120,80 170,92 120,104" class="stroke" fill="#F4FAF7"/>
  <!-- Rental flow lines -->
  <path class="stroke" d="M180 100 Q 200 94, 220 100" fill="none" stroke-dasharray="3 3"/>
<path class="stroke" d="M180 88 Q 200 82, 220 88" fill="none" stroke-dasharray="3 3"/>
<path class="stroke" d="M180 76 Q 200 70, 220 76" fill="none" stroke-dasharray="3 3"/>
  <text x="220" y="76" class="small" text-anchor="end">YIELD</text>
  <text x="120" y="190" class="small" text-anchor="middle">INCOME</text>
</svg>