<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" role="img" aria-label="5-step process timeline">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <line class="stroke" x1="40" y1="60" x2="760" y2="60" stroke-dasharray="4 4"/>
  <g transform="translate(80,0)">
    <circle cy="60" r="22" class="stroke" fill="#F4FAF7"/>
    <text y="65" class="num" text-anchor="middle">01</text>
    <text y="105" class="label" text-anchor="middle">Reach out</text>
  </g>
  <g transform="translate(240,0)">
    <circle cy="60" r="22" class="stroke" fill="#F4FAF7"/>
    <text y="65" class="num" text-anchor="middle">02</text>
    <text y="105" class="label" text-anchor="middle">Assess</text>
  </g>
  <g transform="translate(400,0)">
    <circle cy="60" r="22" class="stroke" fill="#F4FAF7"/>
    <text y="65" class="num" text-anchor="middle">03</text>
    <text y="105" class="label" text-anchor="middle">Market</text>
  </g>
  <g transform="translate(560,0)">
    <circle cy="60" r="22" class="stroke" fill="#F4FAF7"/>
    <text y="65" class="num" text-anchor="middle">04</text>
    <text y="105" class="label" text-anchor="middle">Weekly reports</text>
  </g>
  <g transform="translate(720,0)">
    <circle cy="60" r="22" class="stroke" fill="#F4FAF7"/>
    <text y="65" class="num" text-anchor="middle">05</text>
    <text y="105" class="label" text-anchor="middle">Negotiate & close</text>
  </g>
</svg>