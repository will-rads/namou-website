<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" role="img" aria-label="Payment flow: signing → handover → commission">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <g transform="translate(100,80)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
    <text y="6" class="label" text-anchor="middle">Signing</text>
  </g><line class="stroke" x1="170" y1="80" x2="230" y2="80"/>
  <polygon points="230,76 242,80 230,84" fill="#003D2E"/>
  <g transform="translate(300,80)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
    <text y="6" class="label" text-anchor="middle">Funds received</text>
  </g><line class="stroke" x1="370" y1="80" x2="430" y2="80"/>
  <polygon points="430,76 442,80 430,84" fill="#003D2E"/>
  <g transform="translate(500,80)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
    <text y="6" class="label" text-anchor="middle">Handover</text>
  </g><line class="stroke" x1="570" y1="80" x2="630" y2="80"/>
  <polygon points="630,76 642,80 630,84" fill="#003D2E"/>
  <g transform="translate(700,80)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" class="stroke" fill="#3FE6A8" fill-opacity="0.4"/>
    <text y="6" class="label" text-anchor="middle">Commission paid</text>
  </g>
</svg>