<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" role="img" aria-label="A2A document mockup">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <!-- Page -->
  <rect x="20" y="20" width="200" height="280" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="120" y="50" class="num" text-anchor="middle">AGENCY-TO-AGENCY</text>
  <text x="120" y="68" class="num" text-anchor="middle">AGREEMENT</text>
  <line class="stroke" x1="40" y1="84" x2="200" y2="84" stroke-width="1"/>
  <!-- Lines -->
  <line class="stroke" x1="40" y1="110" x2="190" y2="110" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="128" x2="170" y2="128" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="146" x2="150" y2="146" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="164" x2="190" y2="164" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="182" x2="170" y2="182" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="200" x2="150" y2="200" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="218" x2="190" y2="218" stroke-width="1" opacity="0.4"/>
  <line class="stroke" x1="40" y1="236" x2="170" y2="236" stroke-width="1" opacity="0.4"/>
  <!-- Highlighted clause -->
  <rect x="36" y="240" width="168" height="32" rx="4" fill="#3FE6A8" fill-opacity="0.30" class="stroke" stroke-dasharray="3 3"/>
  <text x="120" y="252" class="small" text-anchor="middle">PROTECTION CLAUSE</text>
  <text x="120" y="265" class="label" text-anchor="middle" font-size="11">50/50 split · buyer protected</text>
  <!-- Signatures -->
  <line class="stroke" x1="40" y1="290" x2="100" y2="290" stroke-width="1"/>
  <line class="stroke" x1="140" y1="290" x2="200" y2="290" stroke-width="1"/>
  <text x="70" y="300" class="small" text-anchor="middle">CO-BROKER</text>
  <text x="170" y="300" class="small" text-anchor="middle">NAMOU</text>
