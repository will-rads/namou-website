<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" role="img" aria-label="Commission flow diagram">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <rect class="bg" width="800" height="220"/>
  <!-- Buyer -->
  <rect x="40" y="80" width="120" height="60" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="100" y="115" class="label" text-anchor="middle">Buyer</text>
  <!-- Funds -->
  <line class="stroke" x1="160" y1="110" x2="320" y2="110"/>
  <polygon points="320,106 332,110 320,114" fill="#003D2E"/>
  <text x="240" y="98" class="small" text-anchor="middle">CLOSING DAY</text>
  <!-- Trustee -->
  <rect x="320" y="80" width="160" height="60" rx="6" class="stroke" fill="#3FE6A8" fill-opacity="0.45"/>
  <text x="400" y="115" class="label" text-anchor="middle">Trustee escrow</text>
  <!-- Splits -->
  <line class="stroke" x1="480" y1="110" x2="600" y2="60"/>
  <polygon points="600,60 590,58 595,68" fill="#003D2E"/>
  <rect x="600" y="40" width="160" height="44" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="680" y="66" class="label" text-anchor="middle">Namou (50%)</text>
  <line class="stroke" x1="480" y1="110" x2="600" y2="160"/>
  <polygon points="600,160 595,152 590,162" fill="#003D2E"/>
  <rect x="600" y="140" width="160" height="44" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="680" y="166" class="label" text-anchor="middle">Co-broker (50%)</text>
</svg>