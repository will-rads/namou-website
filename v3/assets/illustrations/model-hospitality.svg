<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Build-to-hotel isometric illustration">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <polygon points="70,150 130,138 190,150 130,162" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
<polygon points="70,136 130,124 190,136 130,148" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
<polygon points="70,122 130,110 190,122 130,134" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
<polygon points="70,108 130,96 190,108 130,120" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
<polygon points="70,94 130,82 190,94 130,106" class="stroke" fill="#F4FAF7" fill-opacity="1"/>
<polygon points="70,80 130,68 190,80 130,92" class="stroke" fill="#3FE6A8" fill-opacity="0.5"/>
  <!-- Hotel signage -->
  <rect x="115" y="46" width="30" height="14" rx="2" class="stroke" fill="#003D2E"/>
  <text x="130" y="56" class="small" text-anchor="middle" fill="#3FE6A8">★</text>
  <text x="120" y="190" class="small" text-anchor="middle">HOSPITALITY</text>
</svg>