<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Shield and handshake protection illustration">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <!-- Shield silhouette -->
  <path class="stroke" d="M400 80 L 540 130 L 540 280 Q 540 420, 400 510 Q 260 420, 260 280 L 260 130 Z" fill="#3FE6A8" fill-opacity="0.20"/>
  <!-- Inner shield outline -->
  <path class="stroke" d="M400 110 L 510 150 L 510 280 Q 510 400, 400 470 Q 290 400, 290 280 L 290 150 Z" fill="none" stroke-dasharray="4 4"/>
  <!-- Handshake (simplified) -->
  <g transform="translate(400,290)">
    <!-- Left arm -->
    <path class="stroke" d="M-95 -10 L -45 0 L -10 5" fill="none" stroke-width="3"/>
    <!-- Right arm -->
    <path class="stroke" d="M95 -10 L 45 0 L 10 5" fill="none" stroke-width="3"/>
    <!-- Hands meeting -->
    <circle cx="0" cy="0" r="22" class="stroke" fill="#3FE6A8" fill-opacity="0.5"/>
    <line class="stroke" x1="-12" y1="0" x2="12" y2="0" stroke-width="2"/>
  </g>
  <!-- Lock icon at top -->
  <g transform="translate(400,200)">
    <rect x="-18" y="-6" width="36" height="28" rx="3" class="stroke" fill="#003D2E"/>
    <path class="stroke" d="M-10 -6 L -10 -16 Q -10 -24, 0 -24 Q 10 -24, 10 -16 L 10 -6" fill="none" stroke-width="2"/>
  </g>
  <!-- Caption -->
  <text x="400" y="560" class="num" text-anchor="middle">YOUR CLIENT IS PROTECTED</text>
</svg>