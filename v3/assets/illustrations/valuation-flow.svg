<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Valuation methodology flow diagram">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <rect class="bg" width="480" height="360"/>
  <!-- Three input boxes -->
  <rect x="40" y="30" width="140" height="60" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="110" y="65" class="label" text-anchor="middle">Comparables</text>
  <line class="stroke" x1="180" y1="60" x2="280" y2="180"/>
  
<rect x="40" y="120" width="140" height="60" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="110" y="155" class="label" text-anchor="middle">Demand</text>
  <line class="stroke" x1="180" y1="150" x2="280" y2="180"/>
  
<rect x="40" y="210" width="140" height="60" rx="6" class="stroke" fill="#F4FAF7"/>
  <text x="110" y="245" class="label" text-anchor="middle">Area knowledge</text>
  <line class="stroke" x1="180" y1="240" x2="280" y2="180"/>
  
  <!-- Central node -->
  <circle cx="320" cy="180" r="48" class="stroke" fill="#3FE6A8" fill-opacity="0.40"/>
  <text x="320" y="178" class="label" text-anchor="middle">Defensible</text>
  <text x="320" y="194" class="label" text-anchor="middle">price range</text>
  <!-- Output -->
  <line class="stroke" x1="368" y1="180" x2="430" y2="180"/>
  <polygon points="430,176 442,180 430,184" fill="#003D2E"/>
  <text x="350" y="280" class="small">VALUATION OUTPUT</text>
</svg>