<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Annotated RAK map showing freehold zones">
<defs>
  <style>
    .stroke { stroke: #003D2E; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .fill   { fill: #3FE6A8; }
    .label  { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #003D2E; font-weight: 500; }
    .num    { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; fill: #003D2E; letter-spacing: 0.05em; }
    .small  { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #6FB89C; letter-spacing: 0.06em; text-transform: uppercase; }
    .bg     { fill: #F4FAF7; }
  </style>
</defs>
  <rect class="bg" width="800" height="450"/>
  <!-- Coastline -->
  <path class="stroke" d="M40 280 Q 80 250, 130 245 Q 180 240, 220 220 Q 280 200, 340 165 Q 400 120, 480 95 Q 560 80, 640 95 Q 720 110, 770 145 L 770 410 L 40 410 Z"/>
  <!-- Sea -->
  <path d="M40 280 Q 80 250, 130 245 Q 180 240, 220 220 Q 280 200, 340 165 Q 400 120, 480 95 Q 560 80, 640 95 Q 720 110, 770 145 L 770 60 L 40 60 Z" fill="#F4FAF7" opacity="0.5"/>
  <text x="400" y="80" class="small" text-anchor="middle">ARABIAN GULF</text>
  <!-- Al Marjan Island -->
  <ellipse cx="180" cy="180" rx="34" ry="14" class="stroke" fill="#3FE6A8" fill-opacity="0.45"/>
  <text x="180" y="160" class="label" text-anchor="middle">Al Marjan</text>
  <text x="180" y="174" class="small" text-anchor="middle" font-size="10">FREEHOLD</text>
  <!-- Al Hamra -->
  <circle cx="270" cy="220" r="12" class="stroke" fill="#3FE6A8" fill-opacity="0.45"/>
  <text x="270" y="200" class="label" text-anchor="middle">Al Hamra</text>
  <!-- Mina Al Arab -->
  <circle cx="360" cy="195" r="13" class="stroke" fill="#3FE6A8" fill-opacity="0.45"/>
  <text x="360" y="175" class="label" text-anchor="middle">Mina Al Arab</text>
  <!-- RAK Central -->
  <rect x="430" y="240" width="50" height="22" rx="3" class="stroke" fill="#3FE6A8" fill-opacity="0.35"/>
  <text x="455" y="280" class="label" text-anchor="middle">RAK Central</text>
  <!-- Al Nakheel -->
  <circle cx="510" cy="195" r="10" class="stroke" fill="#3FE6A8" fill-opacity="0.35"/>
  <text x="510" y="178" class="label" text-anchor="middle">Al Nakheel</text>
  <!-- Dafan Al Maireed -->
  <rect x="570" y="220" width="60" height="36" rx="3" class="stroke" fill="#3FE6A8" fill-opacity="0.30"/>
  <text x="600" y="270" class="label" text-anchor="middle">Dafan Al Maireed</text>
  <!-- Wynn pin -->
  <circle cx="180" cy="180" r="3" fill="#003D2E"/>
  <line class="stroke" x1="180" y1="178" x2="180" y2="155"/>
  <text x="200" y="148" class="num">★ Wynn Al Marjan</text>
  <!-- Compass -->
  <g transform="translate(720,360)">
    <circle r="22" class="stroke" fill="none"/>
    <line class="stroke" x1="0" y1="-15" x2="0" y2="15"/>
    <text y="-25" class="small" text-anchor="middle">N</text>
  </g>
  <!-- Legend -->
  <g transform="translate(60,360)">
    <rect width="14" height="14" rx="2" class="stroke" fill="#3FE6A8" fill-opacity="0.45"/>
    <text x="22" y="11" class="small">FREEHOLD ZONE</text>
  </g>
</svg>